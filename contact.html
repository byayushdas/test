<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="icon" type="image/jpeg" href="images/favicon1.jpeg">
    <link rel="apple-touch-icon" href="images/favicon1.jpeg">

    <style>
        /* === Brutalist Theme === */
        :root {
            --bg: #ffffff;
            --text: #000000;
            --sidebar-bg: #000000;
            --sidebar-text: #ffffff;
            --border: #000000;
            --input-bg: #ffffff;
            --input-focus: #eeeeee;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --sidebar-bg: #ffffff;
            --sidebar-text: #000000;
            --border: #ffffff;
            --input-bg: #000000;
            --input-focus: #111111;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Inter', Helvetica, Arial, sans-serif;
            transition: background-color 0.2s, color 0.2s;
            overflow-x: hidden;
        }

        /* Dynamic Cursor - Desktop Only */
        @media (hover: hover) and (pointer: fine) {
            * {
                cursor: none !important;
            }

            .custom-cursor {
                position: fixed;
                top: 0;
                left: 0;
                width: 32px;
                height: 32px;
                pointer-events: none;
                z-index: 10000;
                mix-blend-mode: difference;
                display: flex;
                align-items: center;
                justify-content: center;
                transform: translate(-50%, -50%);
                font-family: monospace;
                font-size: 26px;
                font-weight: bold;
                color: white;
                transition: transform 0.15s ease-out;
            }

            .custom-cursor.hover {
                transform: translate(-50%, -50%) scale(1.8);
            }
        }

        /* Hide custom cursor on touch devices */
        @media (hover: none) and (pointer: coarse) {
            .custom-cursor {
                display: none !important;
            }
        }

        /* Hover Effects */
        a:hover, .social-row a:hover {
            text-decoration: underline 3px solid var(--text);
        }

        button:hover {
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            .page-wrapper {
                margin-top: 60px;
                padding: 10px;
            }

            .page-heading {
                font-size: 48px;
                border-bottom-width: 6px;
            }

            .subheading {
                font-size: 14px;
                margin-bottom: 30px;
            }

            .contact-form input,
            .contact-form textarea {
                font-size: 16px;
                padding: 12px 18px;
            }

            .send-btn {
                width: 100%;
                text-align: center;
            }

            .social-row a {
                width: 50px;
                height: 50px;
                font-size: 26px;
            }

            .quote {
                font-size: 32px;
            }
        }

        /* === Theme Toggle === */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border: 3px solid var(--text);
            background: var(--text);
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.1s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* === Hamburger === */
        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hamburger:hover {
            transform: scale(1.1);
        }

        .hamburger span {
            position: absolute;
            background: var(--text);
            transition: transform 0.3s, opacity 0.3s;
        }

        /* Horizontal bar */
        .hamburger span:nth-child(1) {
            width: 24px;
            height: 4px;
        }

        /* Vertical bar */
        .hamburger span:nth-child(2) {
            width: 4px;
            height: 24px;
        }

        /* Hide third span */
        .hamburger span:nth-child(3) {
            display: none;
        }

        /* Hamburger open state — turns "+" into "X" */
        .hamburger.open {
            transform: rotate(45deg);
        }

        .hamburger.open span {
            background: var(--sidebar-text);
        }

        /* === Sidebar === */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 280px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex;
            flex-direction: column;
            padding: 100px 40px;
            border-right: 5px solid var(--sidebar-text);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar nav a {
            color: var(--sidebar-text);
            text-decoration: none;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            transition: padding-left 0.2s;
            border-radius: 8px;
        }

        .sidebar nav a:hover {
            padding-left: 10px;
            background: var(--sidebar-text);
            color: var(--sidebar-bg);
        }

        /* === Overlay === */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* === Page Content === */
        .page-wrapper {
            width: 90%;
            max-width: 1000px;
            margin-top: 100px;
            margin-bottom: 60px;
            padding: 20px;
        }

        /* === Heading === */
        .page-heading {
            font-size: clamp(60px, 12vw, 120px);
            font-weight: 900;
            letter-spacing: -4px;
            text-transform: uppercase;
            line-height: 0.85;
            margin-bottom: 20px;
            color: var(--text);
            border-bottom: 10px solid var(--text);
            padding-bottom: 10px;
            display: inline-block;
        }

        .subheading {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 40px;
            background: var(--text);
            color: var(--bg);
            padding: 5px 15px;
            display: inline-block;
            border-radius: 50px;
        }

        /* === Form === */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .page-heading {
                font-size: 60px;
                letter-spacing: -2px;
            }
        }

        .contact-form input,
        .contact-form textarea {
            background: var(--input-bg);
            border: 3px solid var(--text);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            padding: 15px 25px;
            outline: none;
            transition: background 0.1s;
            resize: none;
            width: 100%;
            border-radius: 12px;
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: var(--text);
            opacity: 0.5;
            text-transform: uppercase;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            background: var(--input-focus);
        }

        .contact-form textarea {
            height: 200px;
        }

        /* === Send Button === */
        .send-btn {
            align-self: flex-start;
            background: var(--text);
            border: 3px solid var(--text);
            color: var(--bg);
            font-size: 20px;
            font-weight: 900;
            padding: 15px 40px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.1s, color 0.1s;
            border-radius: 50px;
        }

        .send-btn:hover {
            background: var(--bg);
            color: var(--text);
        }

        /* === Status === */
        .form-status {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            margin-top: 10px;
        }

        .form-status.success {
            color: #00ff00;
            background: #000;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .form-status.error {
            color: #ff0000;
            background: #000;
            padding: 5px 10px;
            border-radius: 4px;
        }

        /* === Divider === */
        .divider {
            width: 100%;
            height: 5px;
            background: var(--text);
            margin: 40px 0;
            border-radius: 5px;
        }

        /* === Social row === */
        .social-row {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .social-row a {
            color: var(--text);
            font-size: 32px;
            text-decoration: none;
            border: 3px solid var(--text);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s, color 0.1s;
            border-radius: 50%;
        }

        .social-row a:hover {
            background: var(--text);
            color: var(--bg);
        }

        /* Quote */
        .quote {
            margin-top: 40px;
            font-family: 'Great Vibes', cursive;
            font-size: 30px;
            text-align: center;
            color: var(--text);
            opacity: 0.5;
        }

        /* Footer */
        .footer {
            margin-top: 20px;
            margin-bottom: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <!-- Hamburger -->
    <button class="hamburger" id="hamburgerBtn" title="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <nav>
            <a href="index.html">Home</a>
            <a href="education.html">Education</a>
            <a href="works.html">Works</a>
            <a href="contact.html">Reach Out</a>
        </nav>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode"></button>

    <!-- Main Content -->
    <div class="page-wrapper">

        <h1 class="page-heading">GET IN<br><span>TOUCH.</span></h1>
        <p class="subheading">Drop a message — I'll get back to you</p>

        <div class="contact-form">
            <div class="form-row">
                <input type="text" id="senderName" placeholder="Your Name" maxlength="80" />
                <input type="email" id="senderEmail" placeholder="Your Email" maxlength="120" />
            </div>
            <input type="text" id="subject" placeholder="Subject" maxlength="150" />
            <textarea id="message" placeholder="Your Message"></textarea>
            <button class="send-btn" onclick="sendMail()">Send &rarr;</button>
            <p class="form-status" id="formStatus"></p>
        </div>

        <div class="divider"></div>

        <div class="social-row">
            <a href="https://linkedin.com/in/byayushdas" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/byayushdas" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://x.com/byayushdas" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://leetcode.com/byayushdas" target="_blank"><i class="fas fa-code"></i></a>
        </div>

    </div>
    <!-- Quote & Footer -->
    <p class="quote">against all odds.</p>
    <p class="footer">2026 | byayushdas</p>

    <script>
        /* ── Dynamic Cursor ── */
        const cursor = document.createElement('div');
        cursor.className = 'custom-cursor';
        cursor.innerText = '{}';
        document.body.appendChild(cursor);

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a, button, input, textarea, .theme-toggle, .hamburger').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        /* ── Theme ── */
        const toggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        if (localStorage.getItem('theme') === 'dark')
            html.setAttribute('data-theme', 'dark');

        toggle.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        /* ── Sidebar ── */
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('open');
            hamburgerBtn.classList.add('open');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
            hamburgerBtn.classList.remove('open');
        }

        /* ── Contact Form ── */
        function sendMail() {
            const name = document.getElementById('senderName').value.trim();
            const email = document.getElementById('senderEmail').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();
            const status = document.getElementById('formStatus');

            if (!name || !email || !message) {
                status.textContent = 'Please fill in all required fields.';
                status.className = 'form-status error';
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                status.textContent = 'Please enter a valid email address.';
                status.className = 'form-status error';
                return;
            }

            const mailSubject = encodeURIComponent(subject || `Message from ${name} via Portfolio`);
            const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);

            window.location.href = `mailto:ayushxdas2005@gmail.com?subject=${mailSubject}&body=${body}`;

            status.textContent = 'Opening your mail client…';
            status.className = 'form-status success';

            setTimeout(() => {
                document.getElementById('senderName').value = '';
                document.getElementById('senderEmail').value = '';
                document.getElementById('subject').value = '';
                document.getElementById('message').value = '';
                status.textContent = '';
            }, 3000);
        }

        document.getElementById('message').addEventListener('keydown', e => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendMail();
        });
    </script>

</body>

</html>
